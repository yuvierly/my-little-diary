<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>My Little Diary</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Pacifico&display=swap" rel="stylesheet">

</head>

<body>

<!-- 📖 BOOK COVER SCREEN -->

<div id="cover">

<h1>🎀 My Little Diary 🎀</h1>

<p class="subtitle">
Choose Your Cover
</p>

<div class="cover-options">

<div class="cover-choice pink"
onclick="selectCover('pink')">
🎀 Pink Bow
</div>

<div class="cover-choice lavender"
onclick="selectCover('lavender')">
🌸 Lavender Dream
</div>

<div class="cover-choice beige"
onclick="selectCover('beige')">
📖 Vintage Book
</div>

</div>

<button onclick="openBook()">
Open My Book 📖
</button>

</div>

<!-- 📖 ACTUAL DIARY -->

<div id="diary" style="display:none;">

<div class="container">

<button id="newEntryBtn">
+ New Entry
</button>

<div class="book">

<div class="page">

<h2 id="titleDisplay">
No Entries Yet
</h2>

<p id="dateDisplay"></p>

<p id="moodDisplay"></p>

<p id="textDisplay">
Start writing your memories ✨
</p>

</div>

</div>

<div class="navButtons">

<button id="prevBtn">
⬅ Previous
</button>

<button id="nextBtn">
Next ➡
</button>

</div>

</div>

</div>

<!-- Entry Modal -->

<div id="entryModal" class="modal">

<div class="modal-content">

<h2>New Entry</h2>

<input id="titleInput"
placeholder="Entry Title">

<select id="moodInput">

<option>😊 Happy</option>
<option>😢 Sad</option>
<option>😴 Tired</option>
<option>😡 Angry</option>
<option>❤️ Love</option>

</select>

<!-- Font selector -->

<select id="fontSelect">

<option value="Dancing Script">
Cursive
</option>

<option value="Pacifico">
Cute Script
</option>

<option value="serif">
Classic
</option>

</select>

<!-- Color selector -->

<input type="color"
id="colorSelect"
value="#444444">

<textarea
id="textInput"
placeholder="Write your thoughts...">
</textarea>

<button id="saveEntryBtn">
Save Entry
</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
